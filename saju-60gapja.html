  "甲":{dark:false,topBg:"#f0fdf4",hanja:"#166534",tag:{bg:"#dcfce7",c:"#166534"},label:"#166534",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "乙":{dark:false,topBg:"#f0fdf4",hanja:"#166534",tag:{bg:"#dcfce7",c:"#166534"},label:"#166534",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "丙":{dark:false,topBg:"#fff1f2",hanja:"#B91C1C",tag:{bg:"#fee2e2",c:"#B91C1C"},label:"#B91C1C",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "丁":{dark:false,topBg:"#fff1f2",hanja:"#B91C1C",tag:{bg:"#fee2e2",c:"#B91C1C"},label:"#B91C1C",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "戊":{dark:false,topBg:"#fffbeb",hanja:"#92400E",tag:{bg:"#fef3c7",c:"#92400E"},label:"#92400E",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "己":{dark:false,topBg:"#fffbeb",hanja:"#92400E",tag:{bg:"#fef3c7",c:"#92400E"},label:"#92400E",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "庚":{dark:false,topBg:"#f8fafc",hanja:"#374151",tag:{bg:"#e2e8f0",c:"#1e293b"},label:"#374151",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "辛":{dark:false,topBg:"#f8fafc",hanja:"#374151",tag:{bg:"#e2e8f0",c:"#1e293b"},label:"#374151",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "壬":{dark:false,topBg:"#eff6ff",hanja:"#1D4ED8",tag:{bg:"#dbeafe",c:"#1e40af"},label:"#1D4ED8",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
  "癸":{dark:false,topBg:"#eff6ff",hanja:"#1D4ED8",tag:{bg:"#dbeafe",c:"#1e40af"},label:"#1D4ED8",ms:"#444",body:"#fff",bodyBorder:"#f0f0f0"},
};

const SC={"비견":"#ede9fe","겁재":"#ddd6fe","식신":"#fef9c3","상관":"#fde68a","편재":"#d1fae5","정재":"#a7f3d0","편관":"#fee2e2","정관":"#fecaca","편인":"#e0f2fe","정인":"#bae6fd"};
const ST={"비견":"#4c1d95","겁재":"#4c1d95","식신":"#78350f","상관":"#78350f","편재":"#064e3b","정재":"#064e3b","편관":"#7f1d1d","정관":"#7f1d1d","편인":"#0c4a6e","정인":"#0c4a6e"};
const UN_S=["장생","건록","제왕"],UN_M=["관대","목욕","양","태"];
function uc(u){if(UN_S.includes(u))return{bg:"#dbeafe",c:"#1e40af"};if(UN_M.includes(u))return{bg:"#dcfce7",c:"#166534"};return{bg:"#f1f5f9",c:"#475569"};}

let open=new Set([0,1,2,3,4,5]);

function render(){
  document.getElementById("app").innerHTML=SUNS.map((sun,si)=>{
    const isOpen=open.has(si);
    const cards=sun.list.map((ilju,i)=>{
      const d=ALL[ilju];
      if(!d) return`<div class="card"><div class="card-top"><span class="card-hanja">${ilju[0]}</span><div class="card-ilju">${ilju}</div></div></div>`;
      const[igan,oheng,ilji,bongi,shin,un,ms]=d;
      const s=OHENG[igan]||OHENG["甲"];
      const u=uc(un);
      const cardClass=s.dark?"card dark-card":"card";
      return`<div class="${cardClass}" style="background:${s.body}">
        <div class="card-top" style="background:${s.topBg}">
          <div class="card-seq" style="color:${s.dark?'#475569':'#bbb'}">${i+1}</div>
          <span class="card-hanja" style="color:${s.hanja}">${igan}</span>
          <div class="card-ilju" style="color:${s.dark?'#F1F5F9':'#1B2A4A'}">${ilju}</div>
          <div class="card-badges">
            <span class="badge" style="background:${s.tag.bg};color:${s.tag.c}">${oheng}</span>
            <span class="badge" style="background:${SC[shin]||'#f1f5f9'};color:${ST[shin]||'#333'}">${shin}</span>
            <span class="un" style="background:${u.bg};color:${u.c}">${un}</span>
          </div>
        </div>
        <div class="card-body" style="border-top-color:${s.bodyBorder}">
          <div class="card-ms" style="color:${s.ms}">${ms}</div>
        </div>
      </div>`;
    }).join("");

    return`<div class="sun-block">
      <div class="sun-header" onclick="toggle(${si})" style="border-left:4px solid ${sun.color};background:${isOpen?sun.bg:'#f8f8f8'}">
        <span class="sun-title" style="color:${sun.color}">${sun.name}</span>
        <span class="sun-num">&nbsp;${sun.list[0]}~${sun.list[9]}</span>
        <span class="sun-toggle">${isOpen?"▲":"▼"}</span>
      </div>
      <div class="sun-body${isOpen?"":" collapsed"}">${cards}</div>
    </div>`;
  }).join("");
}

window.toggle=i=>{open.has(i)?open.delete(i):open.add(i);render();};
render();
</script>
</body>
</html>
