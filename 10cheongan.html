<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10천간 물상·본질·페르소나 — AI시대 사주문해력</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans KR","맑은 고딕",sans-serif;font-size:13px;color:#1a1a1a;background:#f8f9fa;padding:24px 16px;max-width:960px;margin:0 auto}
h1{font-size:20px;font-weight:700;margin-bottom:4px;color:#1B2A4A}
.meta{font-size:12px;color:#666;margin-bottom:6px}
.note{font-size:11px;color:#888;margin-bottom:20px;border-left:3px solid #C9A84C;padding-left:10px;line-height:1.7;background:#fffbeb;padding:8px 10px;border-radius:0 4px 4px 0}

/* 4축 설명 */
.axis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:24px}
.axis-item{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:10px 12px}
.axis-label{font-size:12px;font-weight:700;color:#C9A84C;margin-bottom:4px}
.axis-desc{font-size:11px;color:#555;line-height:1.5}

/* 오행 그룹 */
.oheng-block{margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0}
.oheng-header{padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,0.06)}
.oheng-title{font-size:15px;font-weight:700}
.oheng-sub{font-size:11px;color:#888;margin-left:auto}
.oheng-toggle{font-size:12px;color:#aaa;margin-left:8px}
.oheng-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.oheng-body.collapsed{display:none}

/* 천간 카드 */
.card{background:#fff;padding:14px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0}
.card:nth-child(2n){border-right:none}
.card:nth-child(n+3){border-bottom:none}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hanja{font-size:32px;font-weight:700;line-height:1}
.label-col{display:flex;flex-direction:column;gap:3px}
.gan-name{font-size:14px;font-weight:700;color:#1B2A4A}
.musang{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}

.axis-row{margin-bottom:7px}
.axis-tag{font-size:10px;font-weight:700;color:#C9A84C;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.axis-val{font-size:12px;color:#333;line-height:1.5}

.quote{font-size:12px;color:#1B2A4A;font-style:italic;background:#f0f4ff;border-left:3px solid #1B2A4A;padding:6px 10px;border-radius:0 4px 4px 0;margin-top:8px;line-height:1.6}

/* 오행 흐름 */
.flow-section{margin-top:24px}
.flow-title{font-size:14px;font-weight:700;color:#1B2A4A;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #C9A84C}
.flow-grid{display:grid;grid-template-columns:1fr;gap:8px}
.flow-item{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start}
.flow-label{font-size:13px;font-weight:700;min-width:110px;color:#1B2A4A}
.flow-desc{font-size:12px;color:#444;line-height:1.6}

footer{margin-top:24px;font-size:10px;color:#bbb;border-top:1px solid #eee;padding-top:10px;text-align:center}

@media(max-width:600px){
  .oheng-body{grid-template-columns:1fr}
  .card:nth-child(2n){border-right:1px solid #f0f0f0}
  .card:nth-child(n+3){border-bottom:1px solid #f0f0f0}
  .card:last-child{border-bottom:none}
  .axis-grid{grid-template-columns:1fr}
}
@media print{.oheng-toggle{display:none}.oheng-body.collapsed{display:grid}}
</style>
</head>
<body>

<h1>10천간(十天干) 물상 · 본질 · 페르소나</h1>
<p class="meta">AI시대 사주문해력 · 별책부록 | 물상 × 핵심본질 × 사회적 페르소나 × 대표대사</p>

<div class="note">
  <strong>4축 구성 원칙</strong><br>
  <strong>물상</strong> — 자연에서 가져온 원형 이미지&nbsp;&nbsp;|&nbsp;&nbsp;
  <strong>핵심본질</strong> — 이 천간이 근본적으로 무엇인가 (나는 무엇인가)&nbsp;&nbsp;|&nbsp;&nbsp;
  <strong>사회적 페르소나</strong> — 세상에서 어떤 사람으로 보이는가&nbsp;&nbsp;|&nbsp;&nbsp;
  <strong>대표대사</strong> — 이 천간이 스스로를 표현하는 한 마디
</div>

<div id="app"></div>

<div class="flow-section" id="flow"></div>

<footer>AI시대 사주문해력 · 時雨 김준범 · 별책부록 — 10천간 물상·본질·페르소나</footer>

<script>
const GANS = [
  {
    oheng:"목(木)", color:"#166534", bg:"#f0fdf4", border:"#86efac",
    list:[
      {
        hanja:"甲", name:"갑(甲)", musang:"거목", musang_bg:"#dcfce7", musang_c:"#166534",
        bonjeong:"최초로 길을 내는 자 — 아무도 가지 않은 곳을 향해 홀로 뻗어나가는 의지",
        persona:"선구자·개척자 — 주변이 따라오든 아니든 먼저 나아가는 사람",
        quote:"\"나는 하늘을 향해 자란다. 혼자라도, 먼저라도.\""
      },
      {
        hanja:"乙", name:"을(乙)", musang:"넝쿨·꽃", musang_bg:"#dcfce7", musang_c:"#166534",
        bonjeong:"끊어지지 않는 생명력 — 어디서든 뿌리내리고 연결하며 살아남는 유연함",
        persona:"연결자·생존자 — 관계 속에서 길을 찾고 틈새를 파고드는 사람",
        quote:"\"나는 끊어진 곳마다 닿는다. 살아있는 한 멈추지 않는다.\""
      }
    ]
  },
  {
    oheng:"화(火)", color:"#B91C1C", bg:"#fff1f2", border:"#fca5a5",
    list:[
      {
        hanja:"丙", name:"병(丙)", musang:"태양", musang_bg:"#fee2e2", musang_c:"#B91C1C",
        bonjeong:"존재 자체가 에너지 — 의도 없이 발산하며 주변을 깨우는 빛",
        persona:"에너자이저·조명자 — 함께 있으면 어둠이 사라지는 사람",
        quote:"\"내가 있는 곳에 어둠은 없다. 나는 숨기지 않는다.\""
      },
      {
        hanja:"丁", name:"정(丁)", musang:"촛불·화로", musang_bg:"#fee2e2", musang_c:"#B91C1C",
        bonjeong:"꺼지지 않는 내면의 불꽃 — 작지만 정밀하게 타오르며 무언가를 완성시키는 힘",
        persona:"장인·연금술사 — 한 가지에 집중해 금을 만들어내는 사람",
        quote:"\"나는 크게 타지 않는다. 하지만 꺼지지도 않는다.\""
      }
    ]
  },
  {
    oheng:"토(土)", color:"#92400E", bg:"#fffbeb", border:"#fcd34d",
    list:[
      {
        hanja:"戊", name:"무(戊)", musang:"거대한 산", musang_bg:"#fef3c7", musang_c:"#92400E",
        bonjeong:"움직이지 않음으로써 모든 것을 받아내는 포용 — 존재 자체가 안전지대",
        persona:"든든한 버팀목·보호자 — 기대도 된다는 걸 몸으로 증명하는 사람",
        quote:"\"나는 흔들리지 않는다. 그래서 사람들이 기댄다.\""
      },
      {
        hanja:"己", name:"기(己)", musang:"논밭·정원", musang_bg:"#fef3c7", musang_c:"#92400E",
        bonjeong:"날것을 받아 쓸모 있게 변환하는 모체 — 보이지 않는 곳에서 생명을 길러내는 힘",
        persona:"조력자·양육자 — 남의 가능성을 알아보고 꽃피워주는 사람",
        quote:"\"나는 받아서 키운다. 씨앗은 내 안에서 비로소 싹튼다.\""
      }
    ]
  },
  {
    oheng:"금(金)", color:"#374151", bg:"#f8fafc", border:"#cbd5e1",
    list:[
      {
        hanja:"庚", name:"경(庚)", musang:"원석·무쇠", musang_bg:"#f1f5f9", musang_c:"#374151",
        bonjeong:"제련되기 전 날것의 강함 — 불과 물의 고통을 통해 비로소 쓸모를 찾아가는 원초적 에너지",
        persona:"실행자·결단자 — 말보다 행동, 망설임 없이 자르고 나아가는 사람",
        quote:"\"제련되어야 쓸모가 생긴다. 나는 그 고통을 두려워하지 않는다.\""
      },
      {
        hanja:"辛", name:"신(辛)", musang:"보석·칼날", musang_bg:"#f1f5f9", musang_c:"#374151",
        bonjeong:"완성을 향한 극한의 예민함 — 이미 제련된 존재가 스스로를 갈고 닦으며 불순물을 용납하지 않는 감각",
        persona:"완벽주의자·심미가 — 아름다움과 정확함에 타협하지 않는 사람",
        quote:"\"나는 완성을 요구한다. 나 자신에게도, 세상에게도.\""
      }
    ]
  },
  {
    oheng:"수(水)", color:"#1D4ED8", bg:"#eff6ff", border:"#93c5fd",
    list:[
      {
        hanja:"壬", name:"임(壬)", musang:"강물·바다", musang_bg:"#dbeafe", musang_c:"#1D4ED8",
        bonjeong:"측량할 수 없는 깊이와 저력 — 막히면 돌아가되 결코 멈추지 않는 지략",
        persona:"전략가·탐험가 — 큰 그림을 그리며 흐름을 읽는 사람",
        quote:"\"나는 막히면 돌아간다. 포기가 아니라 전략이다.\""
      },
      {
        hanja:"癸", name:"계(癸)", musang:"이슬·빗물", musang_bg:"#dbeafe", musang_c:"#1D4ED8",
        bonjeong:"소리 없이 스미는 침투력 — 보이지 않는 곳에서 생각하고 관찰하며 깊어지는 내면",
        persona:"사색가·통찰자 — 남들이 보지 못하는 것을 먼저 느끼는 사람",
        quote:"\"나는 소리 없이 스민다. 그러나 반드시 닿는다.\""
      }
    ]
  }
];

const FLOWS = [
  {label:"목(木) — 갑·을", desc:"생장(生長)의 에너지. 갑목은 홀로 하늘을 향해 뻗는 개척의 힘, 을목은 연결하고 감싸며 살아남는 생존의 힘.", color:"#166534"},
  {label:"화(火) — 병·정", desc:"발산(發散)의 에너지. 병화는 존재 자체로 세상을 비추는 큰 빛, 정화는 내면에서 정밀하게 타오르는 작은 불꽃.", color:"#B91C1C"},
  {label:"토(土) — 무·기", desc:"포용(包容)의 에너지. 무토는 움직이지 않음으로 모든 것을 받아내는 산, 기토는 받아서 키워내는 논밭의 모체.", color:"#92400E"},
  {label:"금(金) — 경·신", desc:"결단(決斷)의 에너지. 경금은 제련의 고통을 통해 쓸모를 찾는 원석, 신금은 완성을 향해 스스로를 갈고 닦는 보석.", color:"#374151"},
  {label:"수(水) — 임·계", desc:"지혜(智慧)의 에너지. 임수는 막힘없이 흐르며 큰 그림을 그리는 전략의 물, 계수는 소리 없이 스미며 깊어지는 통찰의 이슬.", color:"#1D4ED8"},
];

let open = new Set([0,1,2,3,4]);

function renderCards(list) {
  return list.map(g => `
    <div class="card">
      <div class="card-header">
        <div class="hanja" style="color:${g.musang_c}">${g.hanja}</div>
        <div class="label-col">
          <span class="gan-name">${g.name}</span>
          <span class="musang" style="background:${g.musang_bg};color:${g.musang_c}">${g.musang}</span>
        </div>
      </div>
      <div class="axis-row">
        <div class="axis-tag">핵심본질</div>
        <div class="axis-val">${g.bonjeong}</div>
      </div>
      <div class="axis-row">
        <div class="axis-tag">사회적 페르소나</div>
        <div class="axis-val">${g.persona}</div>
      </div>
      <div class="quote">${g.quote}</div>
    </div>
  `).join('');
}

function render() {
  document.getElementById('app').innerHTML = GANS.map((oh, i) => {
    const isOpen = open.has(i);
    return `
      <div class="oheng-block" style="border-color:${oh.border}">
        <div class="oheng-header" onclick="toggle(${i})"
             style="background:${isOpen ? oh.bg : '#f8f8f8'};border-left:4px solid ${oh.color}">
          <span class="oheng-title" style="color:${oh.color}">${oh.oheng}</span>
          <span class="oheng-sub">${oh.list.map(g=>g.hanja).join(' · ')}</span>
          <span class="oheng-toggle">${isOpen ? '▲' : '▼'}</span>
        </div>
        <div class="oheng-body${isOpen ? '' : ' collapsed'}">
          ${renderCards(oh.list)}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('flow').innerHTML = `
    <div class="flow-title">오행별 본질 흐름</div>
    <div class="flow-grid">
      ${FLOWS.map(f => `
        <div class="flow-item" style="border-left:4px solid ${f.color}">
          <span class="flow-label" style="color:${f.color}">${f.label}</span>
          <span class="flow-desc">${f.desc}</span>
        </div>
      `).join('')}
    </div>
    <p style="text-align:center;margin-top:16px;font-size:11px;color:#aaa;font-style:italic">
      천간은 하늘의 기운이 인간 안에 새겨진 원형(原型)이다
    </p>
  `;
}

window.toggle = i => { open.has(i) ? open.delete(i) : open.add(i); render(); };
render();
</script>
</body>
</html>
